services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - mosaic_tmp:/tmp/mosaic
    environment:
      - BASE_UPLOAD_DIR=/tmp/mosaic
      - SESSION_TTL_SECONDS=3600
      - MAX_CONCURRENT_JOBS=4
      - MAX_FILE_SIZE_MB=20
      - MAX_TOTAL_SIZE_MB=500
      - MAX_IMAGES_PER_SESSION=1000
      - THUMBNAIL_SIZE=200
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mosaic_tmp:
