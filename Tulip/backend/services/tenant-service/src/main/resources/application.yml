# =====================================================================
# Tulip+ Tenant Service — application.yml (Sprint 1-C)
# ---------------------------------------------------------------------
# 운영 환경은 별도 application-{env}.yml 로 override (Spring Profile).
# 본 파일은 로컬 개발(localhost) 기본값.
# =====================================================================

server:
  port: 8102
  forward-headers-strategy: framework
  error:
    include-message: always

spring:
  application:
    name: tenant-service
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:postgresql://localhost:5432/tulip
    username: tulip
    password: tulip
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: public
    table: flyway_history_tenant
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${tulip.tenant.keycloak.issuer-uri}
          jwk-set-uri: ${tulip.tenant.keycloak.jwks-uri}
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 30000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  packagesToScan: com.tulip.tenant

# ---------------------------------------------------------------------
# Tulip+ Tenant Service 전용 properties
# ---------------------------------------------------------------------
tulip:
  tenant:
    expected-audiences:
      - tenant-service
      - admin-web
      - opac-web
    keycloak:
      issuer-uri: http://localhost:8088/realms/tulip
      jwks-uri: http://localhost:8088/realms/tulip/protocol/openid-connect/certs
    outbox:
      enabled: true
      poll-delay-ms: 5000
      batch-size: 100
      max-retry: 5

logging:
  level:
    root: INFO
    com.tulip: DEBUG
    org.springframework.security: INFO
    org.apache.kafka: WARN
