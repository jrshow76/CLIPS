# =====================================================================
# Tulip+ IAM Service — application.yml (Sprint 1-B)
# ---------------------------------------------------------------------
# 운영 환경은 별도 application-{env}.yml 로 override (Spring Profile).
# 본 파일은 로컬 개발(localhost) 기본값을 제공한다.
# =====================================================================

server:
  port: 8101
  forward-headers-strategy: framework
  error:
    include-message: always

spring:
  application:
    name: iam-service
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:postgresql://localhost:5432/tulip
    username: tulip
    password: tulip
    hikari:
      maximum-pool-size: 8
      minimum-idle: 1
      connection-timeout: 5000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: public
    table: flyway_history_iam
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${tulip.iam.keycloak.issuer-uri}
          jwk-set-uri: ${tulip.iam.keycloak.jwks-uri}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  packagesToScan: com.tulip.iam

# ---------------------------------------------------------------------
# Tulip+ IAM 전용 properties
# ---------------------------------------------------------------------
tulip:
  iam:
    expected-audiences:
      - admin-web
      - opac-web
      - iam-service
      - account
    pkce-ttl: 5m
    keycloak:
      issuer-uri: http://localhost:8088/realms/tulip
      authorization-endpoint: http://localhost:8088/realms/tulip/protocol/openid-connect/auth
      token-endpoint: http://localhost:8088/realms/tulip/protocol/openid-connect/token
      end-session-endpoint: http://localhost:8088/realms/tulip/protocol/openid-connect/logout
      jwks-uri: http://localhost:8088/realms/tulip/protocol/openid-connect/certs
      client-id: iam-service
      client-secret: iam-service-dev-secret
      default-redirect-uri: http://localhost:8101/api/v1/auth/login/callback
      allowed-redirect-uris:
        - http://localhost:3000/api/auth/callback
        - http://localhost:3001/api/auth/callback
        - http://localhost:8101/api/v1/auth/login/callback
    refresh-cookie:
      name: tulip_rt
      path: /api/v1/auth
      same-site: Lax
      secure: false  # 로컬 개발 한정 — 운영은 true
      max-age: 12h

logging:
  level:
    root: INFO
    com.tulip: DEBUG
    org.springframework.security: INFO
