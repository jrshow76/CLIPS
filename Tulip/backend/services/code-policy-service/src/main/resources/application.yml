# =====================================================================
# Tulip+ Code & Policy Service — application.yml (Sprint 1-C)
# ---------------------------------------------------------------------
# 코드 마스터 + 정책 관리 + Redis 캐시 + cd_outbox 이벤트 발행.
# =====================================================================

server:
  port: 8104
  forward-headers-strategy: framework
  error:
    include-message: always

spring:
  application:
    name: code-policy-service
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:postgresql://localhost:5432/tulip
    username: tulip
    password: tulip
    hikari:
      maximum-pool-size: 8
      minimum-idle: 1
      connection-timeout: 5000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: public
    table: flyway_history_codepolicy
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${tulip.iam.issuer-uri:http://localhost:8088/realms/tulip}
          jwk-set-uri: ${tulip.iam.jwks-uri:http://localhost:8088/realms/tulip/protocol/openid-connect/certs}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 5
  type-handlers-package: com.tulip.common.data.handler
  type-aliases-package: com.tulip.codepolicy.domain

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  packagesToScan: com.tulip.codepolicy

tulip:
  iam:
    issuer-uri: http://localhost:8088/realms/tulip
    jwks-uri: http://localhost:8088/realms/tulip/protocol/openid-connect/certs
    expected-audiences:
      - admin-web
      - opac-web
      - code-policy-service
      - account
  code-policy:
    cache:
      ttl-seconds: 3600
      preload-groups:
        - MATERIAL_TYPE
        - LANGUAGE
        - CURRENCY
        - MEMBER_TYPE
        - POLICY_TARGET_TYPE
    outbox:
      poll-interval-ms: 1000
      batch-size: 100

logging:
  level:
    root: INFO
    com.tulip: DEBUG
    org.springframework.security: INFO
