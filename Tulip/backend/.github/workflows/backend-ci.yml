# =====================================================================
# Tulip+ Backend CI (Phase 1-A)
# ---------------------------------------------------------------------
# 본 워크플로는 repository root 가 아니라 backend/ 하위에 위치한다.
# 실 운영 적용 시 root 의 .github/workflows/ 로 이동하거나 path filter 와
# working-directory 를 활용한다 (README 참조).
# =====================================================================
name: backend-ci

on:
  pull_request:
    branches: [develop, main, "release/*"]
    paths:
      - "Tulip/backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [develop, main]
    paths:
      - "Tulip/backend/**"

defaults:
  run:
    working-directory: Tulip/backend

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: false

      - name: Gradle Build (assemble)
        run: ./gradlew --no-daemon assemble

      - name: Gradle Test
        run: ./gradlew --no-daemon test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: Tulip/backend/**/build/reports/tests/

  lint:
    name: Lint & Static Analysis (placeholder)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      # Phase 1-B 에서 Spotless / Checkstyle / SpotBugs 단계 추가
      - name: Placeholder (Spotless)
        run: echo "spotless check 는 Phase 1-B 에 추가 예정"
      - name: Placeholder (Checkstyle)
        run: echo "checkstyle 은 Phase 1-B 에 추가 예정"
      - name: Placeholder (SCA - Trivy/Snyk)
        run: echo "Dependency / Container scan 은 Phase 1-B 에 추가 예정"

  openapi-lint:
    name: OpenAPI Lint (placeholder)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder (spectral)
        run: echo "spectral lint 는 서비스 모듈(Phase 1-B)이 생기면 활성화한다"

  sonar:
    name: Sonar Quality Gate (placeholder)
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "SonarQube 연동은 Phase 1-B 에 추가 예정"
