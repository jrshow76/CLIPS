version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: footprint-backend
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_SCHEMA: ${DB_SCHEMA:-footprint}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FILE_UPLOAD_DIR: /app/uploads
    volumes:
      - upload_data:/app/uploads
    ports:
      - "8090:8080"
    networks:
      - footprint-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/api/v1/auth/me > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: footprint-frontend
    environment:
      BACKEND_URL: http://backend:8080
      NEXT_PUBLIC_API_URL: http://localhost:8090
      NEXT_PUBLIC_KAKAO_MAP_KEY: ${KAKAO_MAP_KEY:-}
    ports:
      - "3002:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - footprint-net
    restart: unless-stopped

volumes:
  upload_data:

networks:
  footprint-net:
    driver: bridge
