<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지도 | 발자국</title>
  <link rel="stylesheet" href="../common/variables.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── GNB ── */
    .gnb {
      height: 60px;
      background: #fff;
      border-bottom: 1px solid #E7E5E4;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      z-index: 100;
      flex-shrink: 0;
    }
    .gnb__logo { font-size: 20px; font-weight: 800; color: #F97316; display: flex; align-items: center; gap: 6px; text-decoration: none; }
    .gnb__nav { display: flex; gap: 4px; margin-left: 16px; }
    .gnb__nav a {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #78716C;
      text-decoration: none;
      transition: background .15s, color .15s;
    }
    .gnb__nav a:hover, .gnb__nav a.active { background: #FFF8F0; color: #F97316; }
    .gnb__actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .btn-sm {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn-sm--primary { background: #F97316; color: #fff; }
    .btn-sm--primary:hover { background: #EA580C; }
    .btn-sm--ghost { background: transparent; color: #78716C; border: 1.5px solid #E7E5E4; }

    /* ── 메인 레이아웃 ── */
    .map-layout { flex: 1; display: flex; overflow: hidden; }

    /* ── 지도 영역 ── */
    .map-area {
      flex: 1;
      background: #E8E3D9;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .map-placeholder {
      text-align: center;
      color: #A8A29E;
    }
    .map-placeholder__icon { font-size: 64px; display: block; margin-bottom: 12px; }
    .map-placeholder__text { font-size: 16px; }

    /* 지도 위 컨트롤 */
    .map-controls {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .map-ctrl-btn {
      width: 40px;
      height: 40px;
      background: #fff;
      border: 1px solid #E7E5E4;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* ── 사이드 패널 ── */
    .side-panel {
      width: 360px;
      background: #fff;
      border-left: 1px solid #E7E5E4;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .side-panel__header {
      padding: 16px 20px;
      border-bottom: 1px solid #F5F5F4;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .side-panel__title { font-size: 16px; font-weight: 700; color: #1C1917; }
    .side-panel__count { font-size: 13px; color: #78716C; }

    /* 검색 입력 */
    .search-box {
      padding: 12px 16px;
      border-bottom: 1px solid #F5F5F4;
    }
    .search-box input {
      width: 100%;
      border: 1.5px solid #E7E5E4;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
    }
    .search-box input:focus { border-color: #F97316; }

    /* 장소 목록 */
    .place-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .place-item {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background .15s;
    }
    .place-item:hover { background: #FFF8F0; }
    .place-item__thumb {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      background: #F5F5F0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .place-item__info { flex: 1; min-width: 0; }
    .place-item__name { font-size: 14px; font-weight: 600; color: #1C1917; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .place-item__meta { font-size: 12px; color: #78716C; margin-top: 3px; }
    .place-item__badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      background: #FFF8F0;
      color: #F97316;
      margin-top: 5px;
    }

    /* ── 반응형 ── */
    @media (max-width: 768px) {
      .side-panel { display: none; }
      .gnb__nav { display: none; }
    }
  </style>
</head>
<body>

  <!-- GNB -->
  <nav class="gnb">
    <a href="map.html" class="gnb__logo">🗺️ 발자국</a>
    <div class="gnb__nav">
      <a href="map.html" class="active">지도</a>
      <a href="place_list.html">장소 목록</a>
      <a href="#">통계</a>
    </div>
    <div class="gnb__actions">
      <a href="place_register.html" class="btn-sm btn-sm--primary">＋ 장소 등록</a>
      <button class="btn-sm btn-sm--ghost">👤 내 정보</button>
    </div>
  </nav>

  <!-- 지도 + 사이드패널 -->
  <main class="map-layout">

    <!-- 카카오 지도가 마운트될 영역 -->
    <div class="map-area">
      <div class="map-placeholder">
        <span class="map-placeholder__icon">🌍</span>
        <p class="map-placeholder__text">지도를 불러오는 중...</p>
      </div>
      <!-- 지도 컨트롤 -->
      <div class="map-controls">
        <button class="map-ctrl-btn" title="현재 위치">📍</button>
        <button class="map-ctrl-btn" title="확대">＋</button>
        <button class="map-ctrl-btn" title="축소">－</button>
      </div>
    </div>

    <!-- 사이드 패널 -->
    <aside class="side-panel">
      <div class="side-panel__header">
        <span class="side-panel__title">나의 장소</span>
        <span class="side-panel__count">10곳</span>
      </div>
      <div class="search-box">
        <input type="search" placeholder="장소명, 주소 검색...">
      </div>
      <ul class="place-list">
        <li class="place-item">
          <div class="place-item__thumb">🏯</div>
          <div class="place-item__info">
            <p class="place-item__name">경복궁</p>
            <p class="place-item__meta">서울 종로구 · 2026.03.15</p>
            <span class="place-item__badge">관광지</span>
          </div>
        </li>
        <li class="place-item">
          <div class="place-item__thumb">☕</div>
          <div class="place-item__info">
            <p class="place-item__name">성수동 카페거리</p>
            <p class="place-item__meta">서울 성동구 · 2026.04.10</p>
            <span class="place-item__badge">카페</span>
          </div>
        </li>
        <li class="place-item">
          <div class="place-item__thumb">🍖</div>
          <div class="place-item__info">
            <p class="place-item__name">광장시장</p>
            <p class="place-item__meta">서울 종로구 · 2026.04.01</p>
            <span class="place-item__badge">맛집</span>
          </div>
        </li>
        <li class="place-item">
          <div class="place-item__thumb">🏔️</div>
          <div class="place-item__info">
            <p class="place-item__name">제주 한라산</p>
            <p class="place-item__meta">제주 서귀포시 · 2026.04.20</p>
            <span class="place-item__badge">자연</span>
          </div>
        </li>
      </ul>
    </aside>
  </main>

</body>
</html>
