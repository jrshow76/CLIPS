<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | 발자국</title>
  <link rel="stylesheet" href="../common/variables.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--color-primary-50) 0%, var(--color-secondary-50) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── 로그인 카드 ── */
    .auth-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo__icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }
    .auth-logo__title {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-primary-600, #EA580C);
      letter-spacing: -0.5px;
    }
    .auth-logo__subtitle {
      font-size: 14px;
      color: #78716C;
      margin-top: 4px;
    }

    .auth-form { display: flex; flex-direction: column; gap: 16px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 14px;
      font-weight: 600;
      color: #1C1917;
    }
    .form-group input {
      border: 1.5px solid #E7E5E4;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      color: #1C1917;
      transition: border-color .2s;
      outline: none;
    }
    .form-group input:focus { border-color: var(--color-primary-500, #F97316); }
    .form-group input::placeholder { color: #A8A29E; }

    .btn-primary {
      background: var(--color-primary-500, #F97316);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      margin-top: 8px;
    }
    .btn-primary:hover { background: var(--color-primary-600, #EA580C); }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #78716C;
    }
    .auth-footer a {
      color: var(--color-primary-500, #F97316);
      font-weight: 600;
      text-decoration: none;
    }
    .auth-footer a:hover { text-decoration: underline; }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
      .auth-card { padding: 36px 24px; margin: 16px; }
    }
  </style>
</head>
<body>
  <main class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo__icon">🗺️</span>
      <h1 class="auth-logo__title">발자국</h1>
      <p class="auth-logo__subtitle">나의 장소 기록 서비스</p>
    </div>

    <form class="auth-form" novalidate>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email"
               placeholder="이메일을 입력하세요" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password"
               placeholder="비밀번호를 입력하세요" autocomplete="current-password">
      </div>

      <button type="submit" class="btn-primary">로그인</button>
    </form>

    <div class="auth-footer">
      아직 계정이 없으신가요?
      <a href="signup.html">회원가입</a>
    </div>
  </main>
</body>
</html>
