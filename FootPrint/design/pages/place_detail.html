<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경복궁 | 발자국</title>
  <link rel="stylesheet" href="../common/variables.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background: #FAFAF8; }

    .gnb { height: 60px; background: #fff; border-bottom: 1px solid #E7E5E4; display: flex; align-items: center; padding: 0 24px; gap: 12px; position: sticky; top: 0; z-index: 100; }
    .gnb__back { font-size: 22px; text-decoration: none; color: #1C1917; }
    .gnb__logo { font-size: 18px; font-weight: 800; color: #F97316; text-decoration: none; }
    .gnb__actions { margin-left: auto; display: flex; gap: 8px; }
    .btn-sm { padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; border: 1.5px solid #E7E5E4; background: #fff; color: #78716C; cursor: pointer; }
    .btn-sm--danger { border-color: #FCA5A5; color: #DC2626; }

    .container { max-width: 800px; margin: 0 auto; padding: 32px 24px; }

    /* 사진 갤러리 */
    .gallery {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      grid-template-rows: 220px 220px;
      gap: 8px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .gallery__main {
      grid-row: 1 / 3;
      background: linear-gradient(135deg, #FFF8F0, #FDE68A);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }
    .gallery__sub {
      background: linear-gradient(135deg, #F0FDF4, #D1FAE5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    .gallery__more {
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
    }

    /* 상세 정보 */
    .detail-card { background: #fff; border: 1px solid #E7E5E4; border-radius: 16px; padding: 28px; margin-bottom: 20px; }

    .detail-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 700; }
    .badge--orange { background: #FFF8F0; color: #F97316; }

    .detail-title { font-size: 28px; font-weight: 800; color: #1C1917; margin-bottom: 6px; }
    .detail-address { font-size: 15px; color: #78716C; margin-bottom: 20px; }

    .detail-meta { display: flex; gap: 24px; flex-wrap: wrap; border-top: 1px solid #F5F5F4; padding-top: 20px; margin-bottom: 20px; }
    .detail-meta__item { display: flex; flex-direction: column; gap: 4px; }
    .detail-meta__label { font-size: 12px; color: #A8A29E; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-meta__value { font-size: 15px; font-weight: 700; color: #1C1917; }
    .rating-stars { color: #F59E0B; }

    .detail-memo { border-top: 1px solid #F5F5F4; padding-top: 20px; }
    .detail-memo__label { font-size: 13px; font-weight: 700; color: #A8A29E; margin-bottom: 10px; }
    .detail-memo__text { font-size: 15px; color: #44403C; line-height: 1.7; }

    /* 태그 */
    .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; padding-top: 20px; border-top: 1px solid #F5F5F4; }
    .tag { padding: 4px 12px; border-radius: 99px; background: #F5F5F0; color: #78716C; font-size: 13px; font-weight: 500; }
    .tag::before { content: '#'; }

    /* 지도 미니뷰 */
    .mini-map-card { background: #fff; border: 1px solid #E7E5E4; border-radius: 16px; overflow: hidden; }
    .mini-map { height: 200px; background: linear-gradient(135deg, #E8E3D9, #D4CFBE); display: flex; align-items: center; justify-content: center; font-size: 48px; }
    .mini-map-footer { padding: 14px 20px; font-size: 13px; color: #78716C; display: flex; align-items: center; justify-content: space-between; }
    .mini-map-footer a { color: #F97316; font-weight: 600; font-size: 13px; }

    @media (max-width: 600px) {
      .gallery { grid-template-columns: 1fr; grid-template-rows: 220px; }
      .gallery__main { grid-row: 1; }
      .gallery__sub, .gallery__more { display: none; }
    }
  </style>
</head>
<body>

  <nav class="gnb">
    <a href="place_list.html" class="gnb__back">←</a>
    <a href="map.html" class="gnb__logo">🗺️ 발자국</a>
    <div class="gnb__actions">
      <button class="btn-sm">✏️ 수정</button>
      <button class="btn-sm btn-sm--danger">🗑️ 삭제</button>
    </div>
  </nav>

  <div class="container">

    <!-- 사진 갤러리 -->
    <div class="gallery">
      <div class="gallery__main">🏯</div>
      <div class="gallery__sub">🌸</div>
      <div class="gallery__more">+3</div>
    </div>

    <!-- 장소 상세 정보 -->
    <div class="detail-card">
      <div class="detail-badges">
        <span class="badge badge--orange">관광지</span>
      </div>
      <h1 class="detail-title">경복궁</h1>
      <p class="detail-address">📍 서울 종로구 사직로 161</p>

      <div class="detail-meta">
        <div class="detail-meta__item">
          <span class="detail-meta__label">방문일</span>
          <span class="detail-meta__value">2026년 3월 15일</span>
        </div>
        <div class="detail-meta__item">
          <span class="detail-meta__label">평점</span>
          <span class="detail-meta__value"><span class="rating-stars">★★★★★</span> 5.0</span>
        </div>
        <div class="detail-meta__item">
          <span class="detail-meta__label">등록일</span>
          <span class="detail-meta__value">2026.03.15</span>
        </div>
      </div>

      <div class="detail-memo">
        <p class="detail-memo__label">📝 메모</p>
        <p class="detail-memo__text">봄 벚꽃 시즌에 방문. 광화문 주변이 정말 아름다웠다. 날씨가 맑아서 산책하기 딱 좋았고, 수문장 교대식도 볼 수 있었다. 다음에는 야간 개장 때 다시 와보고 싶다.</p>
      </div>

      <div class="tags">
        <span class="tag">궁궐</span>
        <span class="tag">역사</span>
        <span class="tag">봄</span>
        <span class="tag">서울</span>
      </div>
    </div>

    <!-- 미니 지도 -->
    <div class="mini-map-card">
      <div class="mini-map">🌍</div>
      <div class="mini-map-footer">
        <span>37.57952°N, 126.97706°E</span>
        <a href="map.html">지도에서 보기 →</a>
      </div>
    </div>

  </div>

</body>
</html>
