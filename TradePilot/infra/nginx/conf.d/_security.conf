# =============================================================================
# 공통 보안 헤더 (모든 응답에 부여)
# -----------------------------------------------------------------------------
# 사이트 server 블록에서 `include conf.d/_security.conf;` 로 로드한다.
# - HSTS는 HTTPS server에서만 의미가 있으므로 사이트 설정 안에서 include 한다.
# - CSP는 Next.js 앱과 충돌 가능성이 높아 초기엔 Report-Only 권장.
# - `add_header ... always;` 의 `always`는 4xx/5xx 응답에도 헤더를 적용한다.
# =============================================================================

# ----- HSTS (HTTP Strict Transport Security) -----
# - max-age 2년 (Mozilla 권장 ≥ 1년, preload 등록 조건 ≥ 1년)
# - includeSubDomains: 모든 서브도메인 강제
# - preload: HSTS Preload List 등록 시에만 활성 (등록 전엔 주석 처리 권장)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ----- 클릭재킹 방지 -----
add_header X-Frame-Options "DENY" always;

# ----- MIME 스니핑 방지 -----
add_header X-Content-Type-Options "nosniff" always;

# ----- 리퍼러 정책 (외부 사이트로 이동 시 origin만 노출) -----
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ----- XSS 방어 (구형 브라우저 보호, 모던에선 CSP가 우선) -----
add_header X-XSS-Protection "1; mode=block" always;

# ----- Permissions Policy (구 Feature Policy) -----
# 카메라/마이크/위치 등 사용 안 함 → 권한 명시적 차단
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), accelerometer=(), gyroscope=(), fullscreen=(self)" always;

# ----- Cross-Origin Policy (Spectre 류 사이드채널 방어) -----
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site" always;

# ----- Content Security Policy -----
# Next.js inline script (next/script, hydration) 호환을 위해 'unsafe-inline' 일부 허용.
# 운영 안정화 후 nonce 기반으로 강화 권장.
#
# 현재 정책 (기본값):
#   default-src 'self'
#   script-src  'self' 'unsafe-inline' 'unsafe-eval'  (Next.js dev/SSR 호환)
#   style-src   'self' 'unsafe-inline'
#   img-src     'self' data: blob: https:
#   font-src    'self' data:
#   connect-src 'self' wss: https:
#   frame-ancestors 'none'
#   base-uri    'self'
#   form-action 'self'
#
# 초기 운영 시 위반 사례 수집을 위해 Report-Only 사용 권장.
# 1~2주 모니터링 후 위반 없으면 'Content-Security-Policy' 로 전환.
add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; report-uri /csp-report" always;

# CSP 강제 적용 시 위 라인 주석 처리하고 아래 활성화.
# add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
