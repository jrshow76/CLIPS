# =============================================================================
# 공통 프록시 헤더
# -----------------------------------------------------------------------------
# location 블록 안에서 `include conf.d/_proxy.conf;` 로 로드.
# - X-Forwarded-* 표준 헤더 전파 (백엔드는 이 헤더로 클라이언트 정보 식별).
# - HTTP/1.1 강제 (keepalive 유지, WebSocket 호환).
# - 기본 타임아웃 30s. WebSocket location은 별도 read_timeout 설정.
# =============================================================================

proxy_http_version 1.1;
proxy_set_header   Host                $host;
proxy_set_header   X-Real-IP           $remote_addr;
proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto   $scheme;
proxy_set_header   X-Forwarded-Host    $host;
proxy_set_header   X-Forwarded-Port    $server_port;
proxy_set_header   X-Request-ID        $request_id_final;

# 빈 Authorization 헤더 제거 시 백엔드 401 회피
proxy_set_header   Authorization       $http_authorization;

# 프록시 버퍼링 (대용량 응답 대비)
proxy_buffering        on;
proxy_buffer_size      8k;
proxy_buffers          16 8k;
proxy_busy_buffers_size 16k;

# 타임아웃 (일반 API 기준, WebSocket은 별도 override)
proxy_connect_timeout  10s;
proxy_send_timeout     30s;
proxy_read_timeout     30s;

# 업스트림 에러 시 재시도 정책
proxy_next_upstream         error timeout http_502 http_503 http_504;
proxy_next_upstream_tries   2;
proxy_next_upstream_timeout 10s;

# 다이렉트 다운스트림으로 보내지 않을 헤더 (백엔드의 보안 헤더는 nginx 것으로 통일)
proxy_hide_header  X-Powered-By;
proxy_hide_header  Server;
