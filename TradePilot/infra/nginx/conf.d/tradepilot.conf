# =============================================================================
# TradePilot 사이트 설정
# -----------------------------------------------------------------------------
# - 단일 도메인(tradepilot.example.com) 진입
# - HTTP(80) → HTTPS(443) 강제 리디렉션
# - Path 기반 라우팅: /api/v1/* /ws/* /healthz /metrics /
# - WebSocket Upgrade, Rate Limit, 정적 캐싱, 보안 헤더 적용
# - 인증서: Let's Encrypt (infra/letsencrypt/init-letsencrypt.sh 로 발급)
# =============================================================================

# -----------------------------------------------------------------------------
# Upstream 정의 (docker-compose 서비스명 사용 → 내부 DNS 해석)
# -----------------------------------------------------------------------------
upstream tp_backend {
    server backend-api:8000 max_fails=3 fail_timeout=10s;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}

upstream tp_frontend {
    server frontend:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}

# -----------------------------------------------------------------------------
# 1) HTTP(80) → HTTPS(443) 리디렉션
#    - ACME http-01 챌린지(/.well-known/acme-challenge/) 만 평문 허용
# -----------------------------------------------------------------------------
server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name tradepilot.example.com;

    # Let's Encrypt webroot 챌린지
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # 그 외 모두 HTTPS 강제
    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# 2) HTTPS(443) 메인 서버
# -----------------------------------------------------------------------------
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name tradepilot.example.com;

    # ----- 인증서 (Let's Encrypt fullchain) -----
    ssl_certificate     /etc/letsencrypt/live/tradepilot.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tradepilot.example.com/privkey.pem;

    # ----- 보안 헤더 (HSTS 포함) -----
    include /etc/nginx/conf.d/_security.conf;

    # ----- 동시 접속 제한 (한 IP가 100개 초과 차단) -----
    limit_conn zn_conn 100;

    # ----- 커스텀 에러 페이지 -----
    error_page 502 503 504 /errors/5xx.html;
    error_page 429           /errors/429.html;
    error_page 404           /errors/404.html;

    location ^~ /errors/ {
        internal;
        root /usr/share/nginx/html;
    }

    # -------------------------------------------------------------------------
    # /healthz (외부 LB/모니터링용 헬스 체크)
    #   - 백엔드 /healthz 그대로 프록시
    #   - Rate Limit 면제 (잦은 폴링)
    # -------------------------------------------------------------------------
    location = /healthz {
        access_log off;
        include /etc/nginx/conf.d/_proxy.conf;
        proxy_pass http://tp_backend/healthz;
        proxy_read_timeout 5s;
    }

    location = /readyz {
        access_log off;
        include /etc/nginx/conf.d/_proxy.conf;
        proxy_pass http://tp_backend/readyz;
        proxy_read_timeout 5s;
    }

    # -------------------------------------------------------------------------
    # /metrics (Prometheus scrape - 사설망 화이트리스트만)
    #   - 외부 노출 절대 금지
    #   - 사설 대역(10.x, 172.16-31.x, 192.168.x) + 컨테이너 네트워크만 허용
    # -------------------------------------------------------------------------
    location = /metrics {
        # 컨테이너 내부 / 사설망만 허용
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny  all;

        access_log off;
        include /etc/nginx/conf.d/_proxy.conf;
        proxy_pass http://tp_backend/metrics;
        proxy_read_timeout 10s;
    }

    # -------------------------------------------------------------------------
    # /api/v1/auth/login - 브루트포스 방어 (5 req/min)
    # -------------------------------------------------------------------------
    location = /api/v1/auth/login {
        limit_req  zone=zn_login burst=3 nodelay;
        include /etc/nginx/conf.d/_proxy.conf;
        proxy_pass http://tp_backend;
        proxy_read_timeout 30s;
    }

    # -------------------------------------------------------------------------
    # /api/v1/orders - 주문 RPS 제한 (3 req/s, burst 5)
    #   - 시장가 폭주/실수 다중 발주 방어
    # -------------------------------------------------------------------------
    location ~ ^/api/v1/orders(/|$) {
        limit_req  zone=zn_order burst=5 nodelay;
        include /etc/nginx/conf.d/_proxy.conf;
        proxy_pass http://tp_backend;
        proxy_read_timeout 30s;
    }

    # -------------------------------------------------------------------------
    # /api/v1/* - 일반 API (10 req/s, burst 20 nodelay)
    # -------------------------------------------------------------------------
    location /api/v1/ {
        limit_req  zone=zn_api burst=20 nodelay;
        include /etc/nginx/conf.d/_proxy.conf;
        proxy_pass http://tp_backend;
        proxy_read_timeout 30s;

        # CORS는 프론트와 same-origin이므로 기본 미허용. 외부 모바일앱 등 필요 시:
        # add_header Access-Control-Allow-Origin "https://app.example.com" always;
        # add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        # add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
    }

    # -------------------------------------------------------------------------
    # /ws/* - WebSocket (Upgrade)
    #   - handshake 시점만 Rate Limit (zn_ws 20 conn/s)
    #   - read_timeout 1시간 (장중 지속 연결)
    # -------------------------------------------------------------------------
    location /ws/ {
        limit_req  zone=zn_ws burst=40 nodelay;

        include /etc/nginx/conf.d/_proxy.conf;
        proxy_pass http://tp_backend;

        # WebSocket Upgrade 핵심 설정
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # 장 운영 중 지속 연결 (idle 끊김 방지)
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 30s;

        # WebSocket 응답은 버퍼링 OFF (실시간 푸시 즉시 전달)
        proxy_buffering off;
        proxy_cache     off;

        # 압축은 WebSocket 프레임에 의미 없음
        gzip off;
    }

    # -------------------------------------------------------------------------
    # /_next/static/* - Next.js 빌드 정적 자산 (장기 캐싱)
    #   - 파일명에 해시 포함 → immutable 안전
    # -------------------------------------------------------------------------
    location /_next/static/ {
        include /etc/nginx/conf.d/_proxy.conf;
        proxy_pass http://tp_frontend;

        # 1년 immutable 캐싱
        proxy_cache_valid 200 365d;
        expires           365d;
        add_header        Cache-Control "public, max-age=31536000, immutable" always;

        # 보안 헤더는 _security.conf 에서 자동 추가 (HSTS, X-Frame-Options 등)
        access_log off;
    }

    # -------------------------------------------------------------------------
    # /_next/image - Next.js 이미지 최적화 엔드포인트
    # -------------------------------------------------------------------------
    location /_next/image {
        include /etc/nginx/conf.d/_proxy.conf;
        proxy_pass http://tp_frontend;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
    }

    # -------------------------------------------------------------------------
    # /static/* /favicon.ico /robots.txt 등 정적 자산
    # -------------------------------------------------------------------------
    location ~* ^/(favicon\.ico|robots\.txt|manifest\.json|sitemap\.xml)$ {
        include /etc/nginx/conf.d/_proxy.conf;
        proxy_pass http://tp_frontend;
        expires 1d;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600" always;
        access_log off;
    }

    # -------------------------------------------------------------------------
    # 그 외 모든 요청 → Next.js (프론트엔드)
    #   - SSR/CSR/ISR 응답 모두 처리
    #   - SWR 패턴: HTML은 짧은 캐시 + revalidate
    # -------------------------------------------------------------------------
    location / {
        include /etc/nginx/conf.d/_proxy.conf;
        proxy_pass http://tp_frontend;

        # SSR HTML은 너무 길게 캐시하지 않음 (사용자별 데이터 가능성)
        # Next.js 자체 Cache-Control 헤더를 우선시
        proxy_cache_bypass $http_pragma $http_authorization;
        proxy_no_cache     $http_pragma $http_authorization;

        proxy_read_timeout 30s;
    }

    # -------------------------------------------------------------------------
    # 숨김 파일 / 위협 차단
    # -------------------------------------------------------------------------
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    # PHP / 백오피스 자동 스캔 차단
    location ~* \.(php|asp|aspx|jsp)$ {
        return 404;
    }
}
