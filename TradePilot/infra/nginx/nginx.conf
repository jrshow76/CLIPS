# =============================================================================
# TradePilot 프로덕션 nginx 메인 설정
# -----------------------------------------------------------------------------
# - TLS 종단(Let's Encrypt), Path 기반 라우팅, WebSocket Upgrade,
#   Rate Limit, 보안 헤더, 정적 자산 캐싱, JSON 액세스 로그.
# - 사이트별 server 블록은 conf.d/*.conf 에 분리한다.
# - 컨테이너에서 실행되며 worker는 nginx 사용자 권한으로 동작.
# - 변경 후 무중단 재로드: scripts/deploy/reload-nginx.sh
# =============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65536;

# PID / 에러 로그 (컨테이너 표준 출력 연결)
pid        /var/run/nginx.pid;
error_log  /var/log/nginx/error.log warn;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    # -------------------------------------------------------------------------
    # 기본 MIME / 인코딩
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # -------------------------------------------------------------------------
    # 서버 정보 노출 차단 (보안)
    # -------------------------------------------------------------------------
    server_tokens off;
    more_clear_headers Server;   # ngx_headers_more 모듈이 있을 때 동작 (없으면 무시)

    # -------------------------------------------------------------------------
    # JSON 액세스 로그 (Loki/Promtail/Fluent-bit 수집용)
    # -------------------------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"request_id":"$request_id",'
            '"method":"$request_method",'
            '"host":"$host",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time",'
            '"referer":"$http_referer",'
            '"user_agent":"$http_user_agent",'
            '"scheme":"$scheme",'
            '"protocol":"$server_protocol"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # -------------------------------------------------------------------------
    # 성능 / 연결 튜닝
    # -------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65s;
    keepalive_requests 1000;
    reset_timedout_connection on;
    types_hash_max_size 2048;

    client_max_body_size       10m;       # 업로드 제한 (백테스트 CSV 등)
    client_body_buffer_size    128k;
    client_header_buffer_size  4k;
    large_client_header_buffers 4 16k;
    client_body_timeout        30s;
    client_header_timeout      30s;
    send_timeout               30s;

    # -------------------------------------------------------------------------
    # 압축 (gzip)
    # -------------------------------------------------------------------------
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_disable       "msie6";
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        font/ttf
        font/otf
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # -------------------------------------------------------------------------
    # Brotli (모듈이 빌드된 이미지일 경우 활성화. openresty/brotli 이미지 권장)
    # -------------------------------------------------------------------------
    # brotli            on;
    # brotli_comp_level 5;
    # brotli_types      application/javascript application/json text/css text/plain image/svg+xml;

    # -------------------------------------------------------------------------
    # Rate Limit Zone 정의
    #   - api    : 일반 API   10 req/s
    #   - login  : 로그인      5 req/min  (브루트포스 방어)
    #   - ws     : WebSocket  20 conn/s   (handshake 단계만 제한)
    #   - order  : 주문        3 req/s    (시장가 폭주 방어)
    #   - public : 비인증 GET  30 req/s   (시세/지수/검색)
    # zone size = 10MB → 약 16만 IP 추적 가능
    # -------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr zone=zn_api:10m    rate=10r/s;
    limit_req_zone  $binary_remote_addr zone=zn_login:10m  rate=5r/m;
    limit_req_zone  $binary_remote_addr zone=zn_ws:10m     rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=zn_order:10m  rate=3r/s;
    limit_req_zone  $binary_remote_addr zone=zn_public:10m rate=30r/s;

    # 동시 접속 한도 (한 IP가 100개 초과 동시 연결 차단)
    limit_conn_zone $binary_remote_addr zone=zn_conn:10m;

    # Rate Limit 초과 시 응답 코드 (기본 503 → 429로 명확화)
    limit_req_status  429;
    limit_conn_status 429;
    limit_req_log_level warn;

    # -------------------------------------------------------------------------
    # 요청 ID (분산 트레이싱용, X-Request-ID 백엔드 전달)
    # -------------------------------------------------------------------------
    map $http_x_request_id $request_id_final {
        default $http_x_request_id;
        ""      $request_id;
    }

    # WebSocket Upgrade map (proxy_set_header Connection 에 사용)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 클라이언트 실제 IP (Cloudflare/ALB 뒤에 있을 경우 set_real_ip_from 추가)
    # set_real_ip_from 10.0.0.0/8;
    # real_ip_header   X-Forwarded-For;
    # real_ip_recursive on;

    # -------------------------------------------------------------------------
    # SSL 공통 설정 (Mozilla Intermediate)
    # -------------------------------------------------------------------------
    include /etc/nginx/ssl/options-ssl-nginx.conf;

    # -------------------------------------------------------------------------
    # 사이트 설정 로드
    # -------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
