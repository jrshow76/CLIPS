# =============================================================================
# Mozilla Intermediate TLS 권장 설정 (2026 기준, 호환성 우선)
# -----------------------------------------------------------------------------
# 출처: https://ssl-config.mozilla.org/ (Intermediate, nginx 1.25+, OpenSSL 3.x)
# - TLS 1.2 / 1.3만 허용 (1.0 / 1.1 차단)
# - SSL Labs A+ 등급 달성 가능
# - Let's Encrypt fullchain.pem / privkey.pem 사용
# =============================================================================

# ----- 프로토콜 -----
ssl_protocols           TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;

# ----- Cipher Suite (Mozilla Intermediate) -----
ssl_ciphers             "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305";

# ----- ECDH Curve -----
ssl_ecdh_curve          X25519:secp384r1:secp521r1;

# ----- Diffie-Hellman 파라미터 (직접 생성 필요, dhparam.pem.note.md 참조) -----
ssl_dhparam             /etc/nginx/ssl/dhparam.pem;

# ----- 세션 캐시 (TLS 핸드셰이크 부하 감소) -----
ssl_session_cache       shared:SSL:50m;
ssl_session_timeout     1d;
ssl_session_tickets     off;            # PFS 보장 (티켓 키 유출 시 과거 세션 복호화 가능성 차단)

# ----- OCSP Stapling -----
ssl_stapling            on;
ssl_stapling_verify     on;
ssl_trusted_certificate /etc/letsencrypt/live/tradepilot.example.com/chain.pem;

# Stapling용 DNS resolver (Let's Encrypt OCSP 응답 검증)
resolver                1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout        5s;

# ----- 재교섭 방어 -----
# (nginx 1.13+ 기본 활성. 명시적으로 표기하지 않음)
