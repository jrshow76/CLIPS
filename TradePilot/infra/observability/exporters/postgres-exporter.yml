# =============================================================================
# postgres_exporter 환경 설정 - TradePilot
# -----------------------------------------------------------------------------
# - 환경변수 / queries.yaml 형태 모두 가능. 본 파일은 docker-compose env 로 사용.
# - DATA_SOURCE_NAME 은 .env 의 POSTGRES_* 변수에서 조합한다.
#
# docker-compose.observability.yml 의 postgres-exporter 서비스에서 참조한다.
# =============================================================================

DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-tradepilot}:${POSTGRES_PASSWORD:-tradepilot}@postgres:5432/${POSTGRES_DB:-tradepilot}?sslmode=disable"

# 수집 대상 지표 (불필요한 expensive 수집 비활성화)
PG_EXPORTER_DISABLE_DEFAULT_METRICS: "false"
PG_EXPORTER_DISABLE_SETTINGS_METRICS: "false"
PG_EXPORTER_EXCLUDE_DATABASES: "template0,template1"
PG_EXPORTER_AUTO_DISCOVER_DATABASES: "false"

# 커스텀 쿼리 (별도 파일 마운트 시)
# PG_EXPORTER_EXTEND_QUERY_PATH: "/etc/postgres-exporter/queries.yaml"

PG_EXPORTER_WEB_LISTEN_ADDRESS: ":9187"
PG_EXPORTER_WEB_TELEMETRY_PATH: "/metrics"

# 권장: 모니터링 전용 계정으로 분리
#   CREATE USER monitor WITH PASSWORD '...' CONNECTION LIMIT 5;
#   GRANT pg_monitor TO monitor;
