# TradePilot 개발/스테이징용 docker-compose
# - creon-gateway는 Windows 호스트에 별도 배포한다. (docs/23_creon_gateway.md 참조)
# - backend/frontend의 Dockerfile은 시니어 개발자가 작성 예정이며,
#   본 파일에서는 빌드 컨텍스트와 기대 Dockerfile 경로만 명시한다.
# - .env 파일은 .env.example을 참조하여 작성한다.

name: tradepilot

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-development}
  APP_TIMEZONE: Asia/Seoul
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://redis:6379/0
  REDIS_BROKER_URL: redis://redis:6379/1
  REDIS_RESULT_URL: redis://redis:6379/2
  JWT_SECRET: ${JWT_SECRET}
  JWT_ACCESS_TTL_SEC: ${JWT_ACCESS_TTL_SEC:-1800}
  JWT_REFRESH_TTL_SEC: ${JWT_REFRESH_TTL_SEC:-604800}
  CREON_GATEWAY_URL: ${CREON_GATEWAY_URL}
  CREON_GATEWAY_API_KEY: ${CREON_GATEWAY_API_KEY}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  AES_KEY: ${AES_KEY}

services:

  postgres:
    image: postgres:15-alpine
    container_name: tp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tradepilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradepilot}
      POSTGRES_DB: ${POSTGRES_DB:-tradepilot}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tradepilot} -d ${POSTGRES_DB:-tradepilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tp-net

  redis:
    image: redis:7-alpine
    container_name: tp-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - tp-net

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile      # BackendSenior 작성 예정
      target: runtime
    image: tradepilot/backend:dev
    container_name: tp-backend-api
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --workers
      - "2"
    environment:
      <<: *backend-env
      SERVICE_ROLE: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - tp-net

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile      # BackendSenior 작성 예정
      target: runtime
    image: tradepilot/backend:dev
    container_name: tp-backend-worker
    restart: unless-stopped
    command:
      - celery
      - -A
      - app.celery_app
      - worker
      - --loglevel=INFO
      - --concurrency=4
      - -Q
      - default,signals,orders,backtest,ml,notifications
    environment:
      <<: *backend-env
      SERVICE_ROLE: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tp-net

  backend-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile      # BackendSenior 작성 예정
      target: runtime
    image: tradepilot/backend:dev
    container_name: tp-backend-scheduler
    restart: unless-stopped
    command:
      - python
      - -m
      - app.scheduler_app
    environment:
      <<: *backend-env
      SERVICE_ROLE: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tp-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile      # FrontendSenior 작성 예정
      target: runtime
    image: tradepilot/frontend:dev
    container_name: tp-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${APP_ENV:-development}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:8000/ws}
      NEXT_PUBLIC_APP_ENV: ${APP_ENV:-development}
    depends_on:
      - backend-api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - tp-net

volumes:
  postgres-data:
  redis-data:

networks:
  tp-net:
    driver: bridge
