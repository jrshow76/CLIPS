<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TradePilot 알림{% endblock %}</title>
</head>
<body style="margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',Helvetica,Arial,sans-serif;background:#f6f7fb;color:#1f2937;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f7fb;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.05);">
          <tr>
            <td style="padding:24px 32px;border-bottom:1px solid #eef0f4;">
              <div style="font-size:18px;font-weight:700;color:#111827;">TradePilot</div>
              <div style="font-size:12px;color:#6b7280;margin-top:4px;">자동주식매매 시스템</div>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px;border-top:1px solid #eef0f4;background:#fafbfc;border-radius:0 0 8px 8px;">
              <div style="font-size:12px;color:#6b7280;line-height:1.6;">
                본 메일은 발신 전용입니다. 알림 설정은 TradePilot 웹에서 변경할 수 있습니다.<br/>
                문의: <a href="mailto:support@tradepilot.example.com" style="color:#2563eb;">support@tradepilot.example.com</a>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
