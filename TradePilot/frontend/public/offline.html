<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f17" />
    <title>오프라인 — TradePilot</title>
    <link rel="icon" href="/icons/icon-192-placeholder.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: dark light;
        --bg: #0b0f17;
        --bg-elev: #131a26;
        --fg: #e5e7eb;
        --muted: #94a3b8;
        --brand: #60a5fa;
        --border: #1f2937;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8fafc;
          --bg-elev: #ffffff;
          --fg: #0f172a;
          --muted: #64748b;
          --brand: #2563eb;
          --border: #e2e8f0;
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Pretendard, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100%;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 480px;
        width: 100%;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        display: block;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 700;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }
      .actions {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 20px;
      }
      button, .btn {
        background: var(--brand);
        color: white;
        border: 0;
        border-radius: 10px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      button.secondary {
        background: transparent;
        color: var(--fg);
        border: 1px solid var(--border);
      }
      .status {
        margin-top: 16px;
        font-size: 12px;
        color: var(--muted);
      }
      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ef4444;
        margin-right: 6px;
        vertical-align: middle;
      }
      .dot.online { background: #22c55e; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="card" role="alert">
        <img class="icon" src="/icons/icon-192-placeholder.svg" alt="TradePilot" />
        <h1>오프라인 상태입니다</h1>
        <p>
          인터넷에 연결되어 있지 않거나 서버에 일시적으로 접속할 수 없습니다.
          캐시된 일부 화면은 계속 사용할 수 있으며, 실시간 시세와 자동매매 기능은 연결 복구 후 동기화됩니다.
        </p>
        <div class="actions">
          <button id="retry" type="button">다시 시도</button>
          <a href="/dashboard" class="btn secondary">대시보드 열기</a>
        </div>
        <div class="status">
          <span id="status-dot" class="dot"></span>
          <span id="status-text">네트워크 연결 끊김</span>
        </div>
      </div>
    </main>
    <script>
      (function () {
        var dot = document.getElementById('status-dot');
        var text = document.getElementById('status-text');
        var retry = document.getElementById('retry');
        function update() {
          if (navigator.onLine) {
            dot.classList.add('online');
            text.textContent = '연결 복구됨 — 새로고침 가능';
          } else {
            dot.classList.remove('online');
            text.textContent = '네트워크 연결 끊김';
          }
        }
        window.addEventListener('online', update);
        window.addEventListener('offline', update);
        retry.addEventListener('click', function () { location.reload(); });
        update();
      })();
    </script>
  </body>
</html>
