services:
  # ===== PostgreSQL =====
  postgres:
    image: postgres:15-alpine
    container_name: shelfy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shelfy}
      POSTGRES_USER: ${POSTGRES_USER:-shelfy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shelfy_pass}
      TZ: Asia/Seoul
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shelfy_user} -d ${POSTGRES_DB:-shelfy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shelfy-network

  # ===== MinIO (Object Storage - 개발용) =====
  minio:
    image: minio/minio:latest
    container_name: shelfy-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shelfy-network

  # ===== MinIO 버킷 초기화 (최초 기동 시 1회 실행) =====
  minio-init:
    image: minio/mc:latest
    container_name: shelfy-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET:-shelfy-images} &&
      mc anonymous set download local/$${MINIO_BUCKET:-shelfy-images} &&
      echo 'MinIO bucket ready.'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-shelfy-images}
    networks:
      - shelfy-network
    restart: "no"

  # ===== Spring Boot Backend =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shelfy-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-shelfy}
      DB_USER: ${POSTGRES_USER:-shelfy_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-shelfy_pass}
      JWT_SECRET: ${JWT_SECRET:-shelfy-dev-secret-key-must-be-at-least-256-bits-long-change-in-production}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-shelfy-images}
      CDN_BASE_URL: ${CDN_BASE_URL:-http://localhost:9000/shelfy-images}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - shelfy-network

  # ===== Next.js Frontend =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    container_name: shelfy-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - shelfy-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  shelfy-network:
    driver: bridge
