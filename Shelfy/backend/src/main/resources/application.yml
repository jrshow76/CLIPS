spring:
  application:
    name: shelfy-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shelfy}?TimeZone=UTC
    username: ${DB_USER:shelfy_user}
    password: ${DB_PASSWORD:shelfy_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 110MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.shelfy
  type-handlers-package: com.shelfy.common.mybatis
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

jwt:
  secret: ${JWT_SECRET:shelfy-dev-secret-key-must-be-at-least-256-bits-long-change-in-production}
  access-token-expiration: 3600
  refresh-token-expiration: 1209600

storage:
  type: ${STORAGE_TYPE:minio}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:shelfy-images}
  cdn-base-url: ${CDN_BASE_URL:http://localhost:9000/shelfy-images}

shelfy:
  platform-fee-rate: 0.1
  max-login-attempts: 5
  account-lock-duration-minutes: 30
  email-verification-expiry-hours: 24
  password-reset-expiry-hours: 1

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.shelfy: DEBUG
    org.springframework.security: INFO
    org.mybatis: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: WARN
    com.shelfy: INFO
    org.mybatis: WARN
